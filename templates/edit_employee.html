<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CorpTrack – Edit Employee</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <a href="/dashboard" class="logo">CORP<span>TRACK</span></a>
    <nav>
      <a href="/dashboard">← Back to Dashboard</a>
      <a href="/logout" class="btn-nav">Logout</a>
    </nav>
  </div>

  <div class="page">
    <div class="form-card">
      <h1>Edit Employee Record</h1>

      <form method="POST">
        <div class="form-grid">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" value="{{ employee.name }}">
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="text" id="email" name="email" value="{{ employee.email }}">
          </div>
          <div class="form-group">
            <label for="department">Department</label>
            <input type="text" id="department" name="department" value="{{ employee.department }}">
          </div>
          <div class="form-group">
            <label for="job_title">Job Title</label>
            <input type="text" id="job_title" name="job_title" value="{{ employee.job_title }}">
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" name="phone" value="{{ employee.phone }}">
          </div>
          <div class="form-group">
            <label for="date_joined">Date Joined</label>
            <input type="date" id="date_joined" name="date_joined" value="{{ employee.date_joined }}">
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-success">Update Record</button>
          <a href="/dashboard" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
